<!DOCTYPE html>
<html lang="ru"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Login &mdash; Quant Engine</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  background:#111827;color:#E5E7EB;
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;
  font-size:14px;display:flex;align-items:center;justify-content:center;min-height:100vh;
}
.login-card{
  background:#1F2937;border:1px solid #374151;border-radius:16px;padding:40px;
  width:100%;max-width:380px;text-align:center;
}
.login-card h1{color:#F9FAFB;font-size:20px;font-weight:600;margin-bottom:8px}
.login-card .sub{color:#6B7280;font-size:13px;margin-bottom:28px}
.login-card input{
  width:100%;padding:12px 16px;background:#111827;border:1px solid #374151;
  border-radius:8px;color:#E5E7EB;font-size:14px;margin-bottom:16px;
  font-family:'SF Mono',SFMono-Regular,ui-monospace,Menlo,Monaco,Consolas,monospace;
  text-align:center;letter-spacing:2px;
}
.login-card input:focus{outline:none;border-color:#3B82F6}
.login-card button{
  width:100%;padding:12px;background:#3B82F6;color:white;border:none;
  border-radius:8px;cursor:pointer;font-size:14px;font-weight:600;
  transition:background 0.15s;
}
.login-card button:hover{background:#2563EB}
.error{color:#EF4444;font-size:13px;margin-bottom:16px}
.dot{width:8px;height:8px;border-radius:50%;background:#F59E0B;display:inline-block;margin-right:8px;vertical-align:middle}
</style>
</head><body>
<div class="login-card">
  <h1><span class="dot"></span>Quant Engine</h1>
  <div class="sub">Dashboard access token required</div>
  {% if error %}
  <div class="error">Invalid token. Try again.</div>
  {% endif %}
  <form method="POST" action="/login">
    <input type="password" name="token" placeholder="Enter token" autofocus autocomplete="off">
    <button type="submit">Login</button>
  </form>
</div>
</body></html>
